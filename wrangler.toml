# Cloudflare Workers — Vite frontend (marsd)
# Pure static hosting via Workers Assets — no server-side Worker script.
# The browser communicates directly with https://api.marsd.app; no proxy needed.
#
# Deploy: wrangler deploy --env production
# CI:     CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID must be set in environment

name = "marsd"
compatibility_date = "2025-09-01"

# Workers Assets: serve Vite dist/ as static files.
# SPA fallback (/* → /index.html) is automatic via not_found_handling.
[assets]
directory          = "./dist"
not_found_handling = "single-page-application"

# ---------------------------------------------------------------------------
# Local dev (wrangler dev)
# ---------------------------------------------------------------------------
[dev]
ip             = "localhost"
port           = 5173
local_protocol = "http"

# ---------------------------------------------------------------------------
# Build
#
# CI pipeline: npm ci → npm run typecheck:all → npm run build:full → wrangler deploy
#
# Build-time VITE_ variables — set these in:
#   CF dashboard → Workers & Pages → marsd → Settings → Environment Variables
#   (mark as "Build variables", not "Runtime variables" — there is no Worker runtime)
#
#   VITE_BACKEND_URL = https://api.marsd.app
#     Baked into JS bundle; used by getApiBaseUrl() in src/services/runtime.ts
#     so all /api/* fetches go directly to the backend from the browser.
#
#   VITE_WS_API_URL   = wss://api.marsd.app
#     Baked into JS bundle; used by maritime, military-flights, and prediction
#     services for WebSocket relay connections.
#
# Cache invalidation:
#   /assets/*.{js,css} — content-hashed by Vite; browsers always receive the
#   latest bundle automatically after each deploy.
#   index.html / sw.js — invalidated per Workers Assets deployment version;
#   set Cache-Control: no-cache in public/_headers to prevent CDN over-caching.
# ---------------------------------------------------------------------------
[build]
command = "npm run build:cf"

# ---------------------------------------------------------------------------
# Staging environment (branch deploys / smoke tests)
# ---------------------------------------------------------------------------
[env.staging]
name               = "marsd-staging"
compatibility_date = "2025-09-01"

# ---------------------------------------------------------------------------
# Production environment
# Custom domains → CF dashboard: Workers → Triggers → Custom Domains
#   marsd.app, frontend2.marsd.app,
#   tech.marsd.app, finance.marsd.app, happy.marsd.app
# ---------------------------------------------------------------------------
[env.production]
name               = "marsd"
compatibility_date = "2025-09-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
