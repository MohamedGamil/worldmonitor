name: Deploy Web (Cloudflare Pages)

# Deploys the full-variant frontend to Cloudflare Pages on every push to the
# `production` branch. Skips when only documentation/tooling files changed.

on:
  push:
    branches: [production]
    paths-ignore:
      - '*.md'
      - '.planning/**'
      - 'docs/**'
      - 'e2e/**'
      - 'scripts/**'
      - '.github/workflows/lint.yml'
      - '.github/workflows/typecheck.yml'

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck:all

      - name: Build (full variant)
        env:
          VITE_VARIANT: full
        run: npm run build:cf

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=marsd --branch=production --commit-hash=${{ github.sha }}

      - name: Deployment summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`production\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://marsd.app" >> $GITHUB_STEP_SUMMARY
